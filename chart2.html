let chartObjects = {};

function updateGridCharts() {
    const month = document.getElementById("monthSelect").value;
    const container = document.getElementById("gridContainer");

    // Proper cleanup of old charts to prevent memory leak
    Object.values(chartObjects).forEach(chart => chart.destroy());
    container.innerHTML = "";

    Object.keys(weights).forEach(item => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.innerHTML = `<h3>${item}</h3><div class="chart-container"><canvas id="${item}Chart"></canvas></div>`;
        container.appendChild(card);

        const ctx = document.getElementById(`${item}Chart`).getContext('2d');
        const data = monthlyData[month] ? monthlyData[month][item] : new Array(10).fill(0);
        const colors = chartColors[item];

        chartObjects[item] = new Chart(ctx, {
            type: "line",
            data: {
                labels: dates,
                datasets: [{
                    label: item,
                    data: data,
                    borderColor: colors.border,
                    backgroundColor: colors.bg,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 5,
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false, fontFamily: 'Times New Roman' },
                    tooltip: {
                        titleFont: { size: 26, fontFamily: 'Times New Roman', color: 'yellow' },
                        bodyFont: { size: 18, fontFamily: 'Times New Roman' },
                        padding: 15,
                        displayColors: false,
                        callbacks: {
                            label: function(context) {
                                return [
                                    `Value: ${context.parsed.y.toFixed(4)}`,
                                    `Weight: ${weights[item]}`
                                ];
                            }
                        }
                    }
                },
                scales: {
                    x: { ticks: { color: "#94a3b8" }, grid: { color: "#334155" } },
                    y: { ticks: { color: "#94a3b8" }, grid: { color: "#334155" } }
                }
            }
        });
