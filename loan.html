<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Application Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    input[type="file"] {
      border: none;
    }
    .buttons {
      display: flex;
      justify-content: space-between;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .apply {
      background: #28a745;
      color: #fff;
    }
    .apply:hover {
      background: #218838;
    }
    .clear {
      background: #dc3545;
      color: #fff;
    }
    .clear:hover {
      background: #c82333;
    }
    @media (max-width: 600px) {
      .buttons {
        flex-direction: column;
      }
      button {
        width: 100%;
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Opit Traders Loan Application Form</h2>
    <form id="loanForm">
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="fname" required>

      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="lname" required>

      <label for="phone">Telephone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="photo">Passport Photo</label>
      <input type="file" id="photo" name="photo" accept="image/*" required>

      <label for="address">Address</label>
      <textarea id="address" name="address" required></textarea>

      <label for="nid">National Identification Number</label>
      <input type="text" id="nid" name="nid" required>


      <!--witness section for the application-->

      <label for="witness" alignment="center"><b>Provide us with Witness particular</b></label>
      <label for="fname">First Name</label>
      <input type="text" id="fname" name="fname" required>

      <label for="lname">Last Name</label>
      <input type="text" id="lname" name="lname" required>

      <label for="phone">Telephone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="photo">Passport Photo</label>
      <input type="file" id="photo" name="photo" accept="image/*" required>

      <label for="address">Address</label>
      <textarea id="address" name="address" required></textarea>

      <label for="nid">National Identification Number</label>
      <input type="text" id="nid" name="nid" required>
      <div class="buttons">
        <button type="submit" class="apply">Apply</button>
        <button type="reset" class="clear">Clear</button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById("loanForm").addEventListener("submit", function(event) {
      event.preventDefault();
      alert("Application submitted successfully for review!");
    });
  </script>
</body>
</html>
